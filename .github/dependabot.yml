version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      typescript:
        patterns:
          - "typescript"
          - "typescript-eslint"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      build:
        patterns:
          - "tsup"
          - "esbuild"
      linting:
        patterns:
          - "eslint"
          - "eslint-*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
