name: Secret scan

# Scans the repository and every PR diff for leaked secrets using gitleaks.
# Fails the job on any finding — no soft-warn mode. Rules live in
# `.gitleaks.toml`; the default ruleset is inherited and we do NOT add
# project-specific allowlist entries up front. The intent is that the
# first red run surfaces any real leaks for triage instead of being
# pre-silenced.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches new detection patterns shipped by gitleaks
    # upstream against an otherwise-idle branch.
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history is required so PR scans can diff against the merge
          # base and main scans can cover the entire commit history.
          fetch-depth: 0

      # Install the gitleaks CLI directly from the upstream GitHub release
      # rather than using gitleaks-action, which now requires a paid
      # license when the repository owner is classified as a GitHub
      # organization (see https://github.com/gitleaks/gitleaks-action/issues/214
      # and the "missing gitleaks license" error the action emits for our
      # owner "Maitreya001-AI"). The underlying `gitleaks` binary itself
      # remains MIT-licensed and free to run; only the Action wrapper is
      # paywalled. Pinning by version keeps the scan reproducible.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: '8.29.0'
        run: |
          set -euo pipefail
          curl -sSL -o /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full repo scan)
        if: github.event_name != 'pull_request'
        # Full history scan on push-to-main / scheduled / manual dispatch.
        # `detect --source=.` walks the git history; any finding exits
        # non-zero, which fails the job per the workflow's red-on-finding
        # contract documented at the top of this file.
        run: gitleaks detect --source=. --config=.gitleaks.toml --verbose --redact

      - name: Run gitleaks (PR diff scan)
        if: github.event_name == 'pull_request'
        # On pull requests we scan only commits unique to the PR head —
        # the merge-base traversal mirrors what gitleaks-action did for us
        # so PR authors see findings introduced by their changes, not
        # historical leaks inherited from main.
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"
          gitleaks detect \
            --source=. \
            --config=.gitleaks.toml \
            --log-opts="${base_sha}..${head_sha}" \
            --verbose \
            --redact
