name: Mutation

# Mutation testing is expensive — several minutes per module on a fresh
# runner, longer still on incremental misses — so we deliberately DO NOT
# run it on every pull request. It runs:
#
#   - Weekly (Sunday 03:00 UTC) to catch test-suite decay against main.
#   - On manual dispatch (`workflow_dispatch`), for targeted diagnosis.
#
# A broken mutation threshold does NOT block PRs directly. Instead, the
# job fails the scheduled run and surfaces the HTML report as an artifact
# so the on-call engineer can review and open a follow-up issue.

on:
  schedule:
    # Sundays 03:00 UTC — low-traffic window.
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      target:
        description: 'Which mutation script to run (mutation, mutation:core, mutation:validate, mutation:guardrails)'
        required: false
        default: 'mutation'

permissions:
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run Stryker
        working-directory: packages/core
        run: pnpm ${{ github.event.inputs.target || 'mutation' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: stryker-report
          path: packages/core/.stryker-tmp/report/
          retention-days: 30
