name: Perf

# Only gate on PRs. Push-to-main does not re-measure because the baseline
# itself was taken on a specific CI image; a drift signal on main after
# merge is just noise.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bench:
    # Single platform only. Perf numbers vary by 3-10x across OSes —
    # running on multiple matrix entries would mean cross-platform
    # comparisons, which baseline.json is not set up to do.
    runs-on: ubuntu-latest
    # Keep a hard ceiling well above the 2-minute bench target so a hung
    # run is killed with a clear timeout, not a silent job leak.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          # Single pinned Node version — perf metrics are not portable
          # across V8 majors.
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run perf bench
        # `pnpm bench` already applies NODE_OPTIONS=--expose-gc via
        # the package.json script; `exit 1` propagates on regression so
        # the job turns red.
        run: pnpm --filter harness-one bench

      - name: Ensure baseline.json wasn't modified
        # The CI run must NEVER overwrite baseline.json — that is owner-only
        # via `pnpm bench:update`. If the bench script or an accidental
        # UPDATE_BASELINE env var touched the file, fail loudly here.
        run: |
          if ! git diff --quiet packages/core/tests/perf/baseline.json; then
            echo "::error::baseline.json was modified during CI. Only 'pnpm bench:update' (run manually on Ubuntu+Node20) may update this file."
            git --no-pager diff packages/core/tests/perf/baseline.json
            exit 1
          fi
