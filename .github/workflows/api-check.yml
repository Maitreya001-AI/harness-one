name: API Check

# Enforces api-extractor snapshot discipline.
#
# Gate mode: snapshot-diff. Any PR touching public API must:
#   1. Regenerate the affected `packages/*/etc/*.api.md` via
#      `pnpm api:update` and commit the diff (otherwise api-extractor
#      fails in strict mode because local/committed snapshots disagree).
#   2. Include a "## API change rationale" section (≥20 chars) in the
#      PR body justifying WHY the surface is changing.

on:
  pull_request:
    branches: [main]
  # See `version-packages.yml` — required for the bot PR's check-runs.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-extractor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Verify api.md snapshots match committed ones
        run: pnpm api:check

      - name: PR-body rationale gate for api.md diffs
        # Fails the PR if any packages/*/etc/*.api.md differs vs base and
        # the PR body lacks a "## API change rationale" section.
        run: pnpm exec tsx tools/check-api-rationale.ts
