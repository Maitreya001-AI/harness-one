name: Audit

# Enforces the supply-chain promise: every PR and weekly scheduled run
# fails if `pnpm audit --audit-level=high --prod` finds any high/critical
# advisory against the production dependency graph. The lenient audit step
# in ci.yml (continue-on-error) remains for informational printing.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # See `version-packages.yml` — required for the auto-merging bot PR's
  # `pnpm-audit` check-run.
  workflow_dispatch:
  schedule:
    # Mondays 06:00 UTC — catches advisories disclosed over the weekend.
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  pnpm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: pnpm audit (high/critical, prod only)
        run: pnpm audit --audit-level=high --prod
