name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - name: Test with coverage (enforces per-package thresholds)
        # Vitest fails non-zero when coverage falls below thresholds declared
        # in each package's vitest.config.ts (lines/functions/statements=80,
        # branches=75). A dropping coverage now blocks merge.
        run: pnpm test:coverage

      - name: Verify build artifacts contain sourcemaps and declaration maps
        # Protects against accidental removal of `sourcemap: true` /
        # `declarationMap: true` from tsup configs — sourcemaps are required
        # for user debugging of shipped code.
        run: |
          set -e
          for pkg in packages/*/dist; do
            [ -d "$pkg" ] || continue
            count_js_map=$(find "$pkg" -name "*.js.map" | wc -l)
            count_d_map=$(find "$pkg" -name "*.d.ts.map" 2>/dev/null | wc -l || echo 0)
            if [ "$count_js_map" -eq 0 ]; then
              echo "::error::No .js.map found in $pkg — sourcemaps must be emitted for every package"
              exit 1
            fi
            echo "$pkg: $count_js_map .js.map, $count_d_map .d.ts.map"
          done
        shell: bash

      - name: Lint
        run: pnpm lint

      - name: Security audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  changeset-check:
    # Every PR that touches packages/ must include a changeset. Prevents
    # ad-hoc version drift across monorepo packages.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Check for changeset
        run: pnpm exec changeset status --since=origin/main
