name: Migrations

# Executes every fixture under tools/migrations/ and asserts the
# pre/post invariant:
#   - pre-migration code snippet FAILS (or deprecation-warns, if opted
#     in) against the current build, proving the breaking change we
#     documented in MIGRATION.md is real;
#   - post-migration code snippet SUCCEEDS, proving the recipe we
#     handed users actually works.
#
# A silently-passing pre fixture is as bad as a failing post fixture —
# both mean MIGRATION.md is lying to consumers. This workflow is the
# machine-checked counterweight to that prose.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.4.0

      - uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check:migrations
