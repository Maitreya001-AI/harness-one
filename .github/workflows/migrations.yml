name: Migrations

# Executes every fixture under tools/migrations/ and asserts the
# pre/post invariant:
#   - pre-migration code snippet FAILS (or deprecation-warns, if opted
#     in) against the current build, proving the breaking change we
#     documented in MIGRATION.md is real;
#   - post-migration code snippet SUCCEEDS, proving the recipe we
#     handed users actually works.
#
# A silently-passing pre fixture is as bad as a failing post fixture —
# both mean MIGRATION.md is lying to consumers. This workflow is the
# machine-checked counterweight to that prose.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # See `version-packages.yml` — required for the auto-merging bot PR's
  # `check-migrations` check-run.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm check:migrations
