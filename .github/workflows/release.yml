name: Release

# Release pipeline: anchored to a GitHub Release (git tag). For every
# public workspace package we:
#   1. build
#   2. re-verify pack reproducibility (same bytes as PR CI produced)
#   3. pack a canonical tarball under dist/tarballs/
#   4. attest SLSA build provenance via Sigstore (one per tarball)
#   5. publish to npm via OIDC trusted-publisher — NO NPM_TOKEN secret.
#
# The publish step authenticates via the workflow's id-token: write
# OIDC credential. npm's registry verifies the OIDC claim against a
# trusted-publisher record configured once in the npm package settings
# (see docs/release.md). If that record is missing, publish fails with
# 401 rather than silently falling back to a long-lived token.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Pack + attest only; skip publish.'
        required: false
        default: 'true'
        type: string

jobs:
  pack-attest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Reproducibility gate (must pack byte-identical before release)
        run: pnpm check:pack

      - name: Pack every published package into dist/tarballs/
        run: |
          set -euo pipefail
          mkdir -p dist/tarballs
          for pj in packages/*/package.json; do
            pkg_dir=$(dirname "$pj")
            is_private=$(node -p "require('./${pj}').private === true")
            if [ "$is_private" = "true" ]; then
              echo "skip (private): $pkg_dir"
              continue
            fi
            echo "=== pack $pkg_dir ==="
            (cd "$pkg_dir" && pnpm pack --pack-destination "${GITHUB_WORKSPACE}/dist/tarballs")
          done
          ls -la dist/tarballs/

      - name: Attest build provenance for every tarball
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: 'dist/tarballs/*.tgz'

      - name: Upload tarballs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-tarballs
          path: dist/tarballs/*.tgz
          if-no-files-found: error
          retention-days: 30

      - name: Publish to npm via OIDC trusted publisher (with provenance)
        # No NPM_TOKEN — the workflow's id-token: write permission supplies
        # the OIDC credential npm uses to authenticate. Requires the npm
        # package to have a matching trusted-publisher record configured
        # (see docs/release.md). dry_run=true skips the actual publish so
        # workflow_dispatch can smoke-test the pipeline without shipping.
        #
        # --provenance emits a Sigstore-signed npm provenance statement
        # alongside the tarball. It's redundant with the per-package
        # publishConfig.provenance = true we set in packages/*/package.json,
        # but keeping it explicit here makes the signing intent visible in
        # the workflow log and fails loudly if a package ever drops the
        # publishConfig flag.
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run != 'true')
        run: |
          set -euo pipefail
          for tgz in dist/tarballs/*.tgz; do
            echo "=== publish $tgz ==="
            npm publish "$tgz" --access public --provenance
          done
