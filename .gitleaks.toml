# gitleaks configuration for harness-one.
#
# We extend the upstream default ruleset rather than redefining it, so
# every new detector gitleaks ships upstream starts protecting us on the
# next CI run without a config change here.
#
# Philosophy on allowlisting: we deliberately start with an empty
# repo-level allowlist. If secret-scan goes red on a test cassette or
# fixture, that is treated as a finding to investigate (cassettes should
# already be scrubbed; a hit means the scrub missed something). Only add
# paths here with a linked issue explaining why the finding is a true
# negative.

title = "harness-one gitleaks config"

[extend]
# Pull in every rule from gitleaks' own default config.
useDefault = true

# ---------------------------------------------------------------------
# Allowlist — intentionally minimal. Every entry below MUST cite the
# issue that justifies it.
# ---------------------------------------------------------------------

[allowlist]
description = "global allowlist"

# Paths whose entire purpose is to *contain* placeholder secrets — they
# exercise the redaction/scanning surface, so any string in them that
# looks like a leak is by design. Without this, every full-history scan
# on push-to-main re-flags the same fixtures and the workflow goes red
# on every commit.
paths = [
  # Detector documentation with placeholder examples ("sk-ant-", "AKIA", …).
  '''docs/security/ossf-best-practices\.md''',
  # Adversarial redaction tests — fixtures impersonate real secrets.
  '''packages/core/src/redact/__tests__/redact-adversarial\.test\.ts''',
  '''packages/core/tests/security/redact-adversarial\.test\.ts''',
  # Redactor example: fake `tok_…` / `sk-ant-…` values demonstrate the
  # default key matcher in `examples/redact/redactor.ts`.
  '''examples/redact/redactor\.ts''',
  # Langfuse sanitiser test: fixture span carries `api_key: 'sk-1234…'`
  # so the sanitiser's behaviour can be asserted on a known input.
  '''packages/langfuse/src/__tests__/langfuse-sanitize-default\.test\.ts''',
  # Injection-detector test: a realistic JWT is fed to the LOW-sensitivity
  # detector to assert it does NOT block legitimate API-key-shaped content.
  '''packages/core/src/guardrails/__tests__/builtins\.test\.ts''',
]
